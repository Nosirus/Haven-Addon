name: Build and Push Haven image

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: haven-addon
  UPSTREAM_IMAGE: ghcr.io/ancsemi/haven:latest

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      skip: ${{ steps.decide.outputs.skip }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Decide
        id: decide
        run: |
          VERSION=$(grep '^version:' config.yaml | awk '{print $2}' | tr -d '"')

          if [ "${{ github.event_name }}" = "schedule" ]; then
            docker pull ${{ env.UPSTREAM_IMAGE }}
            DIGEST=$(docker inspect --format='{{.Id}}' ${{ env.UPSTREAM_IMAGE }})
            STORED=""
            [ -f .upstream-digest ] && STORED=$(cat .upstream-digest)

            if [ "$STORED" = "$DIGEST" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "$DIGEST" > .upstream-digest
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEWVER="$MAJOR.$MINOR.$((PATCH + 1))"
            sed -i "s/^version: \"$VERSION\"/version: \"$NEWVER\"/" config.yaml
            git config user.name "haven-bot"
            git config user.email "actions@github.com"
            git add config.yaml .upstream-digest
            git commit -m "chore: bump to $NEWVER [skip ci]"
            git push
            VERSION=$NEWVER
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-amd64:
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Env
        run: |
          echo "VERSION=${{ needs.check.outputs.version }}" >> $GITHUB_ENV
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BUILD_ARCH=amd64
            BUILD_VERSION=${{ env.VERSION }}
            BUILD_FROM=${{ env.UPSTREAM_IMAGE }}
          platforms: linux/amd64
          labels: |
            io.hass.arch=amd64
            io.hass.type=addon
            io.hass.version=${{ env.VERSION }}
          output: type=image,compression=zstd,compression-level=9,force-compression=true,oci-mediatypes=true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}-amd64:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}-amd64:latest

  build-aarch64:
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Env
        run: |
          echo "VERSION=${{ needs.check.outputs.version }}" >> $GITHUB_ENV
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BUILD_ARCH=aarch64
            BUILD_VERSION=${{ env.VERSION }}
            BUILD_FROM=${{ env.UPSTREAM_IMAGE }}
          platforms: linux/arm64
          labels: |
            io.hass.arch=aarch64
            io.hass.type=addon
            io.hass.version=${{ env.VERSION }}
          output: type=image,compression=zstd,compression-level=9,force-compression=true,oci-mediatypes=true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}-aarch64:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}-aarch64:latest
