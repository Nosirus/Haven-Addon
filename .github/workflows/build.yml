name: Build and Push Haven image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: haven-addon

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Env
        run: |
          echo "VERSION=$(grep '^version:' config.yaml | awk '{print $2}' | tr -d '"')" >> $GITHUB_ENV
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BUILD_ARCH=amd64
            BUILD_VERSION=${{ env.VERSION }}
            BUILD_FROM=ghcr.io/ancsemi/haven:latest
          platforms: linux/amd64
          labels: |
            io.hass.arch=amd64
            io.hass.type=addon
            io.hass.version=${{ env.VERSION }}
          output: type=image,compression=zstd,compression-level=9,force-compression=true,oci-mediatypes=true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}-amd64:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}-amd64:latest

  build-aarch64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Env
        run: |
          echo "VERSION=$(grep '^version:' config.yaml | awk '{print $2}' | tr -d '"')" >> $GITHUB_ENV
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BUILD_ARCH=aarch64
            BUILD_VERSION=${{ env.VERSION }}
            BUILD_FROM=ghcr.io/ancsemi/haven:latest
          platforms: linux/arm64
          labels: |
            io.hass.arch=aarch64
            io.hass.type=addon
            io.hass.version=${{ env.VERSION }}
          output: type=image,compression=zstd,compression-level=9,force-compression=true,oci-mediatypes=true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}-aarch64:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}-aarch64:latest
