name: Build and Push Haven image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: haven-addon

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: echo "VERSION=$(grep '^version:' config.yaml | awk '{print $2}' | tr -d '"')" >> $GITHUB_ENV

      - uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: amd64
          build-args: |
            BUILD_FROM=ghcr.io/ancsemi/haven:latest
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-amd64
          image-tags: |
            ${{ env.VERSION }}
            latest
          push: "true"
          version: ${{ env.VERSION }}

  build-aarch64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: echo "VERSION=$(grep '^version:' config.yaml | awk '{print $2}' | tr -d '"')" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3

      - uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: aarch64
          build-args: |
            BUILD_FROM=ghcr.io/ancsemi/haven:latest
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-aarch64
          image-tags: |
            ${{ env.VERSION }}
            latest
          push: "true"
          version: ${{ env.VERSION }}
